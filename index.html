<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otimização de Cilindros Flexográficos - Comcoflex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-app min-h-screen p-4 text-app">
    <div class="max-w-full mx-auto bg-surface-alt shadow-lg rounded-lg p-4 sm:p-6 lg:p-8">
<h1 class="text-2xl sm:text-3xl font-bold text-center mb-6 text-app">Otimização de Cilindros de Impressão Flexográfica - Comcoflex</h1>

        <div class="grid grid-cols-1 xl:grid-cols-[minmax(0,320px)_1fr] gap-6">
            <aside class="bg-surface p-6 rounded-lg shadow-sm min-w-0">
                <h2 class="text-xl font-semibold mb-4 text-app">Gerenciar Cilindros</h2>
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-secondary">Cilindro (Z)</label>
                        <input type="number" id="newZ" class="mt-1 block w-full px-3 py-2 border border-light rounded-md shadow-sm focus:outline-none focus-primary" min="1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-secondary">Quantidade em Estoque</label>
                        <input type="number" id="newQty" class="mt-1 block w-full px-3 py-2 border border-light rounded-md shadow-sm focus:outline-none focus-primary" min="1">
                    </div>
                    <button id="addCylinderBtn" type="button" class="self-start btn-secondary px-4 py-2 rounded-md">Adicionar</button>
                    <div>
                        <h3 id="cylinderListTitle" class="text-lg font-semibold mt-4 mb-3">Cilindros em Estoque</h3>
                        <ul id="cylinderList" class="space-y-2">
                        </ul>
                    </div>
                </div>
            </aside>

            <main class="space-y-6 min-w-0">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                    <h2 class="text-xl font-semibold mb-4 text-app">Dados da Etiqueta</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-secondary">Altura (mm)</label>
                            <input type="number" id="height" class="mt-1 block w-full px-3 py-2 border border-light rounded-md shadow-sm focus:outline-none focus-primary" min="1" step="0.1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-secondary">Largura (mm)</label>
                            <input type="number" id="width" class="mt-1 block w-full px-3 py-2 border border-light rounded-md shadow-sm focus:outline-none focus-primary" min="1" step="0.1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-secondary">Quantidade de Cores</label>
                            <select id="colors" class="mt-1 block w-full px-3 py-2 border border-light rounded-md shadow-sm focus:outline-none focus-primary">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                            </select>
                        </div>
                    </div>
                    <button id="calculateBtn" type="button" class="mt-4 btn-primary px-4 py-2 rounded-md">Calcular Otimização</button>
                </div>

                <div id="message" aria-live="polite" class="mb-4 hidden px-4 py-3 rounded-md bg-surface text-app"></div>

                <div id="results" class="mb-6 hidden bg-white p-6 rounded-lg shadow-sm overflow-x-auto">
                    <h2 class="text-xl font-semibold mb-4 text-app">Resultados</h2>
                    <table class="min-w-full w-full table-auto">
                        <thead>
                            <tr class="bg-soft">
                                <th class="px-4 py-2 text-left text-xs font-medium text-secondary uppercase tracking-wider">Cilindro (Z)</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-secondary uppercase tracking-wider">Repetições (R)</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-secondary uppercase tracking-wider">Gap Calculado (mm)</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-secondary uppercase tracking-wider">Status</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="./main.js" defer></script>
</body>
</html>
